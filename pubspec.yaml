name: vehicle_rental_app
description: "A new Flutter project."
publish_to: 'none' # Prevent publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ============ UI & Icons ============
  cupertino_icons: ^1.0.8
  iconsax_flutter: ^1.0.1
  lottie: ^3.3.1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # ============ State Management & Routing ============
  get: ^4.6.5

  # ============ Storage ============
  shared_preferences: ^2.2.2
  get_storage: ^2.1.1
  flutter_secure_storage: ^9.2.4

  # ============ Networking ============
  dio: ^5.9.0
  logger: ^2.5.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2

  # ============ File & Image Handling ============
  file_picker: ^10.3.7
  image_picker: ^1.2.1
  path_provider: ^2.1.3
  permission_handler: ^11.3.1

  # ============ Responsive Design ============
  flutter_screenutil: ^5.9.3

  # ============ Fonts & Styling ============
  google_fonts: ^6.3.2
  intl: ^0.20.0

  # ============ UI Components ============
  smooth_page_indicator: ^1.2.1
  time_range_picker: ^2.3.1
  syncfusion_flutter_datepicker: ^31.2.16
  table_calendar: ^3.2.0
  iconsax: ^0.0.8
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/images/icons/
    - assets/images/cars/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
